version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - BLOCKCHAIN_MOCK=true
      - DATABASE_URL=sqlite:///ordershield.db
    volumes:
      - ./backend:/app
      - db-data:/app/data
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    build: ./dashboard
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://backend:8000
    depends_on:
      - backend
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0

  hardhat:
    image: node:18
    working_dir: /app
    volumes:
      - ./blockchain:/app
    ports:
      - "8545:8545"
    command: npx hardhat node

volumes:
  db-data:
